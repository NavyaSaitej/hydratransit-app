# Standard GitLab CI/CD configuration for HydraTransit (Static Web Application)

stages:
  - lint
  - deploy

# Optional static code quality checking (HTML/CSS/JS)
lint-project:
  stage: lint
  image: node:latest
  script:
    - echo "Validating project assets..."
    - npx -y htmlhint index.html || true
    - echo "Validating CSS styles..."
    - npx -y stylelint style.css --allow-empty-input || true
  allow_failure: true

# GitLab Pages hosting template
pages:
  stage: deploy
  image: node:latest
  script:
    - mkdir .public
    - cp -r * .public
    - mv .public public
    - echo "HydraTransit demo successfully packaged for hosting!"
  artifacts:
    paths:
      - public
  only:
    - main
    - master
