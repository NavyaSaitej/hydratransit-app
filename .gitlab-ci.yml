# Standard GitLab CI/CD configuration for HydraTransit (Static Web Application)

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security
  - deploy

default:
  image: node:20
  before_script:
    - npm ci --prefer-offline || npm install

lint:
  stage: lint
  script:
    - npx eslint . --ext .js,.ts
    - npx biome ci .
  allow_failure: false

format:
  stage: format
  script:
    - npx prettier --check .
    - npx biome format .
  allow_failure: false

type_check:
  stage: type_check
  script:
    - npx tsc --noEmit
  allow_failure: false

test:
  stage: test
  script:
    - npx jest --coverage
  coverage: '/Statements\s*:\s*([\d.]+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  allow_failure: false

coverage:
  stage: coverage
  script:
    - npx jest --coverage --coverageReporters=text-summary
    - echo "Coverage report generated"
  artifacts:
    paths:
      - coverage/
  allow_failure: true

dependency_audit:
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true

# GitLab Pages hosting template
pages:
  stage: deploy
  script:
    - mkdir .public
    - cp -r * .public
    - mv .public public
    - echo "HydraTransit demo successfully packaged for hosting!"
  artifacts:
    paths:
      - public
  only:
    - main
    - master
