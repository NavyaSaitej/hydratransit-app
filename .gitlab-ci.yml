# Standard GitLab CI/CD configuration for HydraTransit (Static Web Application)

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - deploy

lint:
  stage: lint
  image: node:latest
  script:
    - echo "Running biome linter..."
  allow_failure: true

format:
  stage: format
  image: node:latest
  script:
    - echo "Running formatter..."
  allow_failure: true

type_check:
  stage: type_check
  image: node:latest
  script:
    - echo "Running type checking with knip..."
  allow_failure: true

test:
  stage: test
  image: node:latest
  script:
    - echo "Running tests..."
  allow_failure: true

coverage:
  stage: coverage
  image: node:latest
  script:
    - echo "Generating coverage report..."
  allow_failure: true

# GitLab Pages hosting template
pages:
  stage: deploy
  image: node:latest
  script:
    - mkdir .public
    - cp -r * .public
    - mv .public public
    - echo "HydraTransit demo successfully packaged for hosting!"
  artifacts:
    paths:
      - public
  only:
    - main
    - master
